<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="14" fill="#1b1d23"/>
  <!-- "P" (PixelOE) built from 8px blocks: closed bowl (top + right + mid) over a stem -->
  <g shape-rendering="crispEdges" fill="#6cc6f2">
    <rect x="16" y="8"  width="8" height="8"/>
    <rect x="24" y="8"  width="8" height="8"/>
    <rect x="32" y="8"  width="8" height="8"/>
    <rect x="40" y="8"  width="8" height="8"/>
    <rect x="16" y="16" width="8" height="8"/>
    <rect x="40" y="16" width="8" height="8"/>
    <rect x="16" y="24" width="8" height="8"/>
    <rect x="24" y="24" width="8" height="8"/>
    <rect x="32" y="24" width="8" height="8"/>
    <rect x="40" y="24" width="8" height="8"/>
    <rect x="16" y="32" width="8" height="8"/>
    <rect x="16" y="40" width="8" height="8"/>
    <rect x="16" y="48" width="8" height="8"/>
  </g>
  <!-- subtle pixel-art shading: top-left highlight, bottom/right shadow -->
  <g shape-rendering="crispEdges">
    <rect x="16" y="8"  width="8" height="8" fill="#8ad3f7"/>
    <rect x="24" y="8"  width="8" height="8" fill="#8ad3f7"/>
    <rect x="32" y="24" width="8" height="8" fill="#3f86b4"/>
    <rect x="40" y="24" width="8" height="8" fill="#3f86b4"/>
    <rect x="16" y="48" width="8" height="8" fill="#3f86b4"/>
  </g>
</svg>
